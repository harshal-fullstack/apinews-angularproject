<form (submit)="onSearch(); $event.preventDefault()">
  <div class="input-group search-input-group">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input type="text" class="form-control text-white" [(ngModel)]="query" placeholder="Search news..." name="search">
    <button class="btn btn-primary-gradient" type="submit">Search</button>
  </div>
</form>
