<div class="card glass-card h-100 mb-3" *ngIf="article">
  <div class="card-img-wrapper position-relative">
    <img class="card-img-top" alt="News image" [src]="article.urlToImage || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=600&auto=format&fit=crop'" >
    <span class="badge bg-indigo position-absolute top-0 start-0 m-3" *ngIf="article.source?.name">
      {{ article.source.name }}
    </span>
  </div>
  <div class="card-body d-flex flex-column">
    <h5 class="card-title fw-bold text-white mb-2 line-clamp-2">{{ article.title }}</h5>
    <p class="card-text text-muted mb-4 line-clamp-3">{{ article.description || 'No description available for this article.' }}</p>
    <div class="mt-auto d-flex justify-content-between align-items-center">
      <small class="text-muted-date" *ngIf="article.publishedAt">
        <i class="bi bi-calendar3 me-1"></i> {{ article.publishedAt | date:'mediumDate' }}
      </small>
      <a [href]="article.url" target="_blank" class="btn btn-read-more">
        Read Article <i class="bi bi-box-arrow-up-right ms-1"></i>
      </a>
    </div>
  </div>
</div>
